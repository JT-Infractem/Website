<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infractem</title>
  <meta name="description" content="Infractem — Coming Soon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Palette (from logo) ── */
    :root {
      --bg:        #0D1B2A;
      --surface:   #152238;
      --primary:   #1D4ED8;
      --accent:    #3B82F6;
      --highlight: #60A5FA;
      --light:     #DBEAFE;
      --text:      #FFFFFF;
      --muted:     #94A3B8;
    }

    /* ── Page ── */
    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Ambient background glow ── */
    body::before {
      content: '';
      position: absolute;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(29,78,216,0.15) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50%      { opacity: 1;   transform: translateX(-50%) scale(1.1); }
    }

    /* ── Logo ── */
    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 2rem;
      animation: fadeInUp 1s ease-out;
      filter: drop-shadow(0 0 40px rgba(59,130,246,0.25));
    }

    /* ── Content ── */
    .content {
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeInUp 1s ease-out 0.2s both;
    }

    .brand-name {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--text) 0%, var(--highlight) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    /* ── Divider ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 2rem;
    }

    /* ── Contact ── */
    .contact {
      font-size: 0.95rem;
      color: var(--muted);
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    .contact a {
      color: var(--highlight);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .contact a:hover {
      color: var(--text);
    }

    /* ── Bottom bar ── */
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.5;
      animation: fadeInUp 1s ease-out 0.8s both;
    }

    /* ── Animation ── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .logo { width: 130px; }
      .tagline { letter-spacing: 0.15em; }
    }
  </style>
</head>
<body>

  <div class="content">
    <h1 class="brand-name">INFRACTEM</h1>
    <p class="tagline">Coming Soon</p>
    <div class="divider"></div>
    <p class="contact">
      <a href="mailto:Info@Infractem.ca">Info@Infractem.ca</a>
    </p>
  </div>

  <p class="footer">&copy; 2026 Infractem</p>

</body>
</html>
